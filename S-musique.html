<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musique Interactive</title>
    <link rel="stylesheet" href="style0.1.css">
    <style>
        
    </style>
</head>
<body>
    <header>
        <h1>Ma Super Galerie</h1>
    </header>

    <div class="container">
        <section>
            <h2>Découvrez nos Merveilles</h2>
            <p>
                Bienvenue dans notre galerie d'images et de vidéos. Cliquez sur n'importe quelle vignette pour l'agrandir et voir les détails.
                Nous avons sélectionné des moments spéciaux pour vous. Profitez de l'expérience immersive !
            </p>

            <div class="gallery">
                <div class="gallery-item" data-type="image" data-full-src="photo/logo/video.png">
                    <img src="photo/logo/video.png" alt="Paysage magnifique">
                </div>

                <div class="gallery-item" data-type="video" data-video-src="photo/logo/video.png">
                    <img src="photo/logo/video.png" alt="Vidéo de la nature">
                    <div class="video-overlay">
                        <i class="fas fa-play-circle"></i>
                    </div>
                </div>

                <div class="gallery-item" data-type="image" data-full-src="photo/logo/video.png">
                    <img src="photo/logo/video.png" alt="Architecture moderne">
                </div>

                <div class="gallery-item" data-type="video" data-video-src="photo/logo/video.png">
                    <img src="photo/logo/video.png" alt="Vidéo d'exploration">
                    <div class="video-overlay">
                        <i class="fas fa-play-circle"></i>
                    </div>
                </div>

                <div class="gallery-item" data-type="image" data-full-src="photo/logo/video.png">
                    <img src="photo/logo/video.png" alt="Coucher de soleil">
                </div>

                <div class="gallery-item" data-type="video" data-video-src="photo/logo/video.png">
                    <img src="photo/logo/video.png" alt="Vidéo de la ville">
                    <div class="video-overlay">
                        <i class="fas fa-play-circle"></i>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="close-button" id="closeButton">&times;</span>
        <div class="lightbox-content" id="lightboxContent">
            </div>
    </div>
    
    <a href="1-index.html" class="button" style="margin-left: 450px;">Retournez vers la premier page</a>
    <script src="script html2.js"></script>
       
    </script>
</body>
</html>
