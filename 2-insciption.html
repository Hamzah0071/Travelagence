<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <link rel="stylesheet" href="style-s-inscrire.css">
</head>
<body>
    <h2>Entrez vos renseignements</h2>
    <form id="formulaire">
        <label for="nom">Nom :</label>
        <input type="text" id="nom" name="nom" required><br>

        <label for="prenom">Prénom :</label>
        <input type="text" id="prenom" name="prenom" required><br>

        <label for="age">Âge :</label>
        <input type="number" id="age" name="age" required><br>

        <label for="pays">Pays :</label>
        <input type="text" id="pays" name="pays" required><br>

        <label for="email">Email :</label>
        <input type="email" id="email" name="email" required><br>

    

    <form>
        <label for="region">Région :</label>
        <select id="region" name="region">
            <option value="">-- Choisissez une région --</option>
            <option value="+201">Diego Suarez (201)</option>
            <option value="+202">Antananarivo (202)</option>
            <option value="+203">Fianarantsoa (203)</option>
            <option value="+204">Mahajanga (204)</option>
            <option value="+205">Toamasina (205)</option>
            <option value="+206">Toliara (206)</option>
        </select>

        <label for="numero">Numéro régional sélectionné :</label>
        <input type="text" id="numero" name="numero" required>
    </form>

    <script>
        const regionSelect = document.getElementById("region");
        const numeroInput = document.getElementById("numero");

        regionSelect.addEventListener("change", function () {
            numeroInput.value = regionSelect.value;
        });
    </script>

        

        <button type="submit" class="btn">S'inscrire</button>
    </form>

    <a href="1-index.html" class="retour">Retourner vers la première page</a>
</body>
</html>
